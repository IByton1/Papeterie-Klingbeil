    <style>
        /* Hero-Section Beispiel */
        #hero {
            min-height: 60vh;
            background: url('../assets/img/hero.webp') center center/cover no-repeat;
            position: relative;
            color: #fff;
        }

        #hero::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            /* dunkler Overlay-Effekt */
        }

        #hero .hero-content {
            position: relative;
            z-index: 1;
            /* über Overlay */
            text-align: center;
            padding: 100px 20px;
        }

        /* Galerie: Masonry-ähnliches Grid */
        .grid-container {
            display: grid;
            /* Mit auto-fill + minmax füllt das Grid dynamisch den Platz */
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            /* Automatische Zeilenhöhe (wir nutzen grid-auto-rows + Span-Klassen) */
            grid-auto-rows: 200px;
            gap: 10px;
            margin-top: 50px;
            /* etwas Abstand zum Titel */
        }

        .grid-item {
            position: relative;
            overflow: hidden;
        }

        .grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .grid-item:hover img {
            transform: scale(1.1);
        }

        /* Größere Felder: doppelte Höhe oder doppelte Breite */
        .grid-item.big {
            grid-row: span 2;
            /* doppelte Höhe */
        }

        .grid-item.wide {
            grid-column: span 2;
            /* doppelte Breite */
        }
    </style>
</head>
