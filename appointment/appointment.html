<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Termin buchen - Barber Shop Jena</title>
    <link rel="stylesheet" href="../bootstrap/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="appointment.css">
    <link rel="stylesheet" href="../assets/css/main.css">
</head>

<body>

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <img src="../assets/img/barbershop-logo.webp" alt="Barber Shop Jena Logo">
                <span>Barber Shop Jena</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="../index.html#home">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="../index.html#services">Services</a></li>
                    <li class="nav-item"><a class="nav-link" href="../index.html#features">Features</a></li>
                    <li class="nav-item"><a class="nav-link" href="../index.html#team">Team</a></li>
                    <li class="nav-item"><a class="nav-link" href="../index.html#contact">Contact</a></li>
                    <li class="nav-item"><a class="nav-link active" href="#appointment">Termin buchen</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Terminbuchung -->
    <section class="calendar-container">
        <h2 class="text-center">Termin buchen</h2>
        <p class="text-center">Wähle einen Tag und eine verfügbare Uhrzeit aus.</p>
        <div id="calendar"></div>
        <div id="timeSlots" class="text-center mt-4"></div>
    </section>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-3">
        <p>© 2025 Barber Shop Jena. Alle Rechte vorbehalten.</p>
    </footer>

    <script src="../bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let lastScrollTop = 0;
        const navbar = document.querySelector(".navbar");

        window.addEventListener("scroll", function () {
            let scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            if (scrollTop > lastScrollTop) {
                navbar.classList.add("hidden");
            } else {
                navbar.classList.remove("hidden");
            }
            lastScrollTop = scrollTop;
        });

        document.addEventListener('DOMContentLoaded', function () {
            var calendarEl = document.getElementById('calendar');
            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                selectable: true,
                dateClick: function (info) {
                    generateTimeSlots(info.dateStr);
                }
            });
            calendar.render();
        });

        function generateTimeSlots(date) {
            const timeSlots = document.getElementById("timeSlots");
            timeSlots.innerHTML = `<h4>Wähle eine Uhrzeit für ${date}</h4>`;
            let bookedAppointments = ["10:00", "12:30", "15:00"];
            for (let hour = 9; hour < 17; hour++) {
                for (let minute of ["00", "30"]) {
                    let time = `${hour}:${minute}`;
                    let slot = document.createElement("div");
                    slot.classList.add("time-slot");
                    slot.innerText = time;
                    if (bookedAppointments.includes(time)) {
                        slot.classList.add("booked");
                    } else {
                        slot.addEventListener("click", function () {
                            alert(`Termin gebucht für ${date} um ${time}`);
                        });
                    }
                    timeSlots.appendChild(slot);
                }
            }
        }
    </script>
</body>

</html>
